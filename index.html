<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEXICON — Latein-Vokabeltrainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#e9e0c9;
  --bg-deep:#dcd0ae;
  --card:#f5efdf;
  --card-edge:#c9bb95;
  --ink:#2b2117;
  --ink-soft:#6b5c48;
  --ink-faint:#9c8c72;
  --accent:#8c2f28;
  --accent-dark:#6a221d;
  --accent-tint:#f0ded9;
  --gold:#a9823d;
  --success:#4f6b52;
  --success-tint:#dfe8de;
  --error:#a8451f;
  --error-tint:#f2ded2;
  --line: rgba(43,33,23,0.16);
  --shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 10px 24px -14px rgba(43,33,23,0.55);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top left, rgba(255,255,255,0.25), transparent 55%),
    radial-gradient(ellipse at bottom right, rgba(0,0,0,0.06), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Source Serif 4', Georgia, serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

::selection{ background:var(--gold); color:var(--card); }
:focus-visible{ outline:2.5px solid var(--gold); outline-offset:2px; border-radius:3px; }
button{ font-family:inherit; cursor:pointer; }
input, select{ font-family:inherit; }

.wrap{ max-width:760px; margin:0 auto; padding:36px 20px 80px; }

header.top{ text-align:center; margin-bottom:28px; position:relative; }
.crest{ display:inline-flex; align-items:center; gap:10px; margin-bottom:6px; }
.crest svg{ width:30px; height:30px; }
h1.title{
  font-family:'Cinzel', serif; font-weight:700; font-size:clamp(28px, 6vw, 40px);
  letter-spacing:0.14em; margin:0; color:var(--accent-dark);
  text-shadow: 0 1px 0 rgba(255,255,255,0.5), 0 2px 3px rgba(43,33,23,0.15);
}
p.subtitle{ font-style:italic; color:var(--ink-soft); margin:6px 0 0; font-size:15px; letter-spacing:0.02em; }
.pool-stat{ margin-top:10px; font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.05em; color:var(--ink-faint); text-transform:uppercase; }
.pool-stat b{ color:var(--accent); font-weight:600; }
.account-bar{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; font-size:12.5px; color:var(--ink-faint); }
.account-bar button{ border:none; background:none; color:var(--accent-dark); text-decoration:underline; font-size:12.5px; }

nav.tabs{ display:flex; gap:8px; border-bottom:2px solid var(--line); margin-bottom:26px; flex-wrap:wrap; }
nav.tabs button{
  flex:1 1 auto; min-width:120px; background:transparent; border:none; padding:12px 10px 14px;
  font-family:'Cinzel', serif; font-size:13px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--ink-faint); border-bottom:3px solid transparent; transition:color .2s, border-color .2s;
}
nav.tabs button:hover{ color:var(--accent-dark); }
nav.tabs button.active{ color:var(--accent); border-bottom-color:var(--accent); }
nav.tabs button:disabled{ opacity:0.35; cursor:not-allowed; }

.panel{ background:var(--card); border:1px solid var(--card-edge); border-radius:10px; box-shadow:var(--shadow); padding:26px; position:relative; }
.panel + .panel{ margin-top:20px; }
.panel::before{
  content:""; position:absolute; left:20px; right:20px; top:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent); opacity:0.5;
}
h2.section-title{
  font-family:'Cinzel', serif; font-size:15px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--accent-dark); margin:0 0 18px; display:flex; align-items:center; justify-content:space-between; gap:10px;
}
label.field-label{ display:block; font-size:12.5px; letter-spacing:0.04em; color:var(--ink-soft); margin-bottom:5px; font-family:'IBM Plex Mono', monospace; }
label.field-label .req{ color:var(--accent); }
input[type=text], input[type=email], input[type=password], input[type=number], select.select-field{
  width:100%; padding:9px 11px; border:1px solid var(--card-edge); background:#fffdf7; border-radius:6px;
  color:var(--ink); font-size:15px; transition:border-color .15s, box-shadow .15s;
}
input:focus, select.select-field:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(169,130,61,0.18); }
input.field-error{ border-color:var(--error); background:var(--error-tint); }
.field-error-msg{ font-size:12px; color:var(--error); margin-top:4px; }
.field-notice-msg{ font-size:12.5px; color:var(--success); margin-top:8px; }
.field{ margin-bottom:16px; }
.field-hint{ font-size:12px; color:var(--ink-faint); margin-top:4px; }

.segmented{ display:flex; border:1px solid var(--card-edge); border-radius:7px; overflow:hidden; }
.segmented button{ flex:1; background:#fffdf7; border:none; padding:9px 6px; font-size:13px; color:var(--ink-soft); border-right:1px solid var(--card-edge); }
.segmented button:last-child{ border-right:none; }
.segmented button.active{ background:var(--accent); color:#fff9ef; }

.meaning-row{ display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.meaning-row input{ flex:1; }
.icon-btn{
  border:1px solid var(--card-edge); background:#fffdf7; width:34px; height:34px; border-radius:6px;
  color:var(--accent); font-size:16px; line-height:1; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.icon-btn:hover{ background:var(--accent-tint); }
.link-add{ background:none; border:none; color:var(--accent-dark); font-size:13px; text-decoration:underline; text-underline-offset:3px; padding:2px 0; margin-top:2px; }

.btn-row{ display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; align-items:center;}
.btn{
  font-family:'Cinzel', serif; letter-spacing:0.06em; font-size:13px; text-transform:uppercase;
  padding:12px 22px; border-radius:7px; border:1px solid var(--accent); background:var(--accent); color:#fdf6ea;
  transition:background .15s, transform .1s;
}
.btn:hover{ background:var(--accent-dark); }
.btn:active{ transform:translateY(1px); }
.btn.secondary{ background:transparent; color:var(--accent-dark); }
.btn.secondary:hover{ background:var(--accent-tint); }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }
.btn.small{ padding:9px 16px; font-size:12px; }
.btn.full{ width:100%; }

.navigium-link{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--gold); text-decoration:none; border-bottom:1px dotted var(--gold); padding-bottom:1px; }
.navigium-link:hover{ color:var(--accent-dark); border-color:var(--accent-dark); }

.pool-list{ display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.pool-item{ display:flex; align-items:center; gap:10px; padding:9px 12px; background:#fffdf7; border:1px solid var(--line); border-radius:6px; font-size:14px; flex-wrap:wrap; }
.pool-item .lw{ font-weight:600; color:var(--accent-dark); min-width:100px; }
.pool-item .meta{ color:var(--ink-faint); font-size:12px; font-family:'IBM Plex Mono', monospace; flex:1; min-width:140px; }
.pool-item .folder-chip{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--gold); border:1px solid var(--gold); border-radius:20px; padding:2px 8px; }
.pool-item .actions{ display:flex; gap:6px; margin-left:auto; }
.pool-item .actions button{ border:none; background:none; font-size:13px; color:var(--ink-faint); padding:2px 6px; }
.pool-item .actions button:hover{ color:var(--accent); }
.empty-note{ color:var(--ink-faint); font-style:italic; font-size:14px; padding:10px 2px; }

.filter-row{ display:flex; gap:10px; margin:14px 0 10px; flex-wrap:wrap; }
.filter-row input{ flex:2; min-width:160px; }
.filter-row select{ flex:1; min-width:140px; }

.context-bar{ margin-bottom:20px; }
.context-label{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:8px; }
.context-chips{ display:flex; flex-wrap:wrap; gap:8px; }
.folder-chip-btn{
  border:1px solid var(--card-edge); background:#fffdf7; border-radius:20px; padding:6px 14px;
  font-size:13px; color:var(--ink-soft);
}
.folder-chip-btn:hover{ background:var(--accent-tint); }
.folder-chip-btn.active{ background:var(--accent); color:#fff9ef; border-color:var(--accent); }
.folder-chip-btn.add{ border-style:dashed; color:var(--gold); border-color:var(--gold); }
.quick-add-row{ display:flex; gap:8px; margin-top:10px; }
.quick-add-row input{ flex:1; }

.pool-item.compact{ padding:6px 10px; font-size:13px; }
.pool-checkbox{ flex-shrink:0; width:16px; height:16px; accent-color:var(--accent); }
.dict-suggestions{ margin-top:8px; display:flex; flex-direction:column; gap:4px; }
.dict-suggestion-item{
  display:flex; align-items:center; gap:10px; text-align:left; width:100%;
  padding:8px 10px; border:1px solid var(--card-edge); background:#fffdf7; border-radius:6px; font-size:13px; color:var(--ink);
}
.dict-suggestion-item:hover{ background:var(--accent-tint); border-color:var(--accent); }
.dict-suggestion-item .dsi-word{ font-weight:600; color:var(--accent-dark); min-width:90px; }
.dict-suggestion-item .dsi-type{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; color:var(--gold); flex-shrink:0; }
.dict-suggestion-item .dsi-meaning{ color:var(--ink-faint); flex:1; text-align:left; }
.select-all-row{ font-size:12.5px; color:var(--ink-soft); margin:2px 0 10px; }
.select-all-row label{ display:flex; align-items:center; gap:6px; cursor:pointer; }
.bulk-bar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:var(--accent-tint); border:1px solid var(--accent); border-radius:8px;
  padding:10px 14px; margin-bottom:12px; font-size:13px; color:var(--accent-dark);
}
.bulk-bar select{ padding:6px 8px; border-radius:6px; border:1px solid var(--card-edge); background:#fffdf7; font-size:13px; }

.folder-manage-row{ display:flex; gap:8px; margin-bottom:12px; }
.folder-manage-row input{ flex:1; }
.folder-tag-list{ display:flex; flex-wrap:wrap; gap:8px; }
.folder-tag{ display:flex; align-items:center; gap:6px; background:#fffdf7; border:1px solid var(--card-edge); border-radius:20px; padding:5px 6px 5px 12px; font-size:13px; }
.folder-tag button{ border:none; background:none; color:var(--ink-faint); font-size:12px; width:22px; height:22px; border-radius:50%; }
.folder-tag button:hover{ color:var(--accent); background:var(--accent-tint); }

.practice-wrap{ display:flex; flex-direction:column; align-items:center; }
.practice-top-row{ width:100%; max-width:420px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:10px; flex-wrap:wrap; }
.practice-progress{ font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.06em; color:var(--ink-faint); }
.folder-select{ font-size:12.5px; padding:6px 8px; border:1px solid var(--card-edge); border-radius:6px; background:#fffdf7; color:var(--ink-soft); }
.flashcard{ width:100%; max-width:420px; height:270px; perspective:1600px; margin-top:8px; }
.flashcard-inner{ position:relative; width:100%; height:100%; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; cursor:pointer; }
.flashcard.flipped .flashcard-inner{ transform:rotateY(180deg); }
.face{
  position:absolute; inset:0; backface-visibility:hidden; border-radius:10px; border:1px solid var(--card-edge);
  background: linear-gradient(155deg, rgba(255,255,255,0.5), transparent 40%), var(--card);
  box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:26px; text-align:center;
}
.face.front .word{ font-family:'Cinzel', serif; font-size:clamp(26px,6vw,36px); color:var(--accent-dark); letter-spacing:0.03em; text-shadow:0 1px 0 rgba(255,255,255,0.6); }
.face.front .type-tag{ margin-top:12px; font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold); }
.face.front .flip-hint{ position:absolute; bottom:16px; font-size:11px; color:var(--ink-faint); font-style:italic; }
.face.back{ transform:rotateY(180deg); }
.face.back .word{ font-family:'Cinzel', serif; font-size:20px; color:var(--accent-dark); margin-bottom:10px; }
.face.back .forms{ font-family:'IBM Plex Mono', monospace; font-size:13.5px; color:var(--ink-soft); margin-bottom:12px; line-height:1.7; }
.face.back hr{ width:60px; border:none; border-top:1px solid var(--gold); opacity:0.5; margin:0 0 10px; }
.face.back .meanings{ font-size:16px; color:var(--ink); line-height:1.5; }
.practice-controls{ display:flex; gap:12px; margin-top:22px; align-items:center; flex-wrap:wrap; justify-content:center; }

.settings-row{ display:flex; flex-direction:column; gap:18px; }
.slider-row{ display:flex; align-items:center; gap:14px; }
input[type=range]{ flex:1; accent-color:var(--accent); }
.slider-val{ font-family:'IBM Plex Mono', monospace; min-width:34px; text-align:center; color:var(--accent-dark); font-weight:600; }
.toggle-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; background:#fffdf7; border:1px solid var(--line); padding:12px 14px; border-radius:7px; }
.toggle-row .label{ font-size:14px; }
.toggle-row .desc{ font-size:12px; color:var(--ink-faint); margin-top:2px; }
.switch{ position:relative; width:44px; height:24px; flex-shrink:0; }
.switch input{ opacity:0; width:0; height:0; }
.switch .track{ position:absolute; inset:0; background:var(--card-edge); border-radius:20px; transition:background .2s; }
.switch .knob{ position:absolute; top:3px; left:3px; width:18px; height:18px; background:#fff9ef; border-radius:50%; transition:transform .2s; box-shadow:0 1px 2px rgba(0,0,0,0.3); }
.switch input:checked + .track{ background:var(--accent); }
.switch input:checked + .track .knob{ transform:translateX(20px); }

.test-progress{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-faint); letter-spacing:0.06em; margin-bottom:14px; }
.test-word{ font-family:'Cinzel', serif; font-size:clamp(24px,5vw,32px); color:var(--accent-dark); text-align:center; margin-bottom:6px; }
.test-type{ text-align:center; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:22px; }
.answer-block{ margin-bottom:22px; }
.answer-block .block-title{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); margin-bottom:10px; }
.answer-input-row{ margin-bottom:10px; position:relative; }
.answer-input-row input{ width:100%; }
.answer-input-row.correct input{ border-color:var(--success); background:var(--success-tint); }
.answer-input-row.incorrect input{ border-color:var(--error); background:var(--error-tint); }
.answer-feedback{ font-size:12.5px; margin-top:4px; font-family:'IBM Plex Mono', monospace; }
.answer-feedback.correct{ color:var(--success); }
.answer-feedback.incorrect{ color:var(--error); }

.summary-score{ text-align:center; padding:10px 0 20px; }
.summary-score .big{ font-family:'Cinzel', serif; font-size:44px; color:var(--accent-dark); }
.summary-score .lbl{ font-size:13px; color:var(--ink-faint); font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }
.summary-list{ margin-top:16px; display:flex; flex-direction:column; gap:8px; }
.summary-item{ border:1px solid var(--line); border-radius:6px; padding:10px 12px; background:#fffdf7; font-size:13.5px; }
.summary-item .sw{ font-weight:600; color:var(--accent-dark); }
.summary-item .detail{ color:var(--ink-soft); margin-top:3px; font-size:12.5px; }

.empty-state{ text-align:center; padding:50px 20px; color:var(--ink-faint); }
.empty-state .big-word{ font-family:'Cinzel', serif; font-size:20px; color:var(--accent-dark); margin-bottom:8px; }

.auth-tabs{ display:flex; gap:8px; margin-bottom:20px; }
.auth-tabs button{ flex:1; padding:10px; border:1px solid var(--card-edge); background:#fffdf7; border-radius:7px; font-size:13px; color:var(--ink-soft); }
.auth-tabs button.active{ background:var(--accent); color:#fff9ef; border-color:var(--accent); }

.setup-notice{ font-size:14px; line-height:1.7; }
.setup-notice code{ background:#fffdf7; border:1px solid var(--line); padding:1px 6px; border-radius:4px; font-family:'IBM Plex Mono', monospace; font-size:13px; }

@media (prefers-reduced-motion: reduce){ .flashcard-inner{ transition:none; } *{ transition:none !important; } }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="crest">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 20V6l8-3 8 3v14" stroke="#8c2f28" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M4 20h16M8 20v-7h8v7" stroke="#8c2f28" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="12" cy="9" r="1.6" fill="#a9823d"/>
      </svg>
      <h1 class="title">Lexicon</h1>
    </div>
    <p class="subtitle">Dein Latein-Vokabelarchiv</p>
    <div class="pool-stat" id="poolStat"></div>
    <div class="account-bar" id="accountBar"></div>
  </header>

  <nav class="tabs" id="mainNav" style="display:none;">
    <button data-tab="add" class="active">Hinzufügen</button>
    <button data-tab="pool">Vokabelpool</button>
    <button data-tab="practice">Üben</button>
    <button data-tab="test">Test</button>
  </nav>

  <main id="content"></main>

</div>

<script>
/* =====================================================================
   KONFIGURATION — hier deine Supabase-Zugangsdaten eintragen
   (Project Settings -> API in deinem Supabase-Projekt)
   ===================================================================== */
const SUPABASE_URL = 'https://cmggdraktkijfmptlynx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtZ2dkcmFrdGtpamZtcHRseW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzYzMDYsImV4cCI6MjA5OTk1MjMwNn0.VNPghMV6h8qHASpt-bpm_kC_dLP_yVkPFZkMzX5s8Nw';
/* ===================================================================== */

const RAW_URL = SUPABASE_URL.trim().replace(/^['"]+|['"]+$/g, '');
const RAW_KEY = SUPABASE_ANON_KEY.trim().replace(/^['"]+|['"]+$/g, '');
const CONFIG_MISSING = !RAW_URL || !RAW_KEY || RAW_URL.includes('DEINE_') || RAW_KEY.includes('DEIN_');
const CLEAN_URL = RAW_URL.replace(/\/+$/, ''); // trailing slash breaks Supabase's request routing
const CONFIG_INVALID = !CONFIG_MISSING && (
  !/^https:\/\/[a-zA-Z0-9-]+\.supabase\.co$/.test(CLEAN_URL) || RAW_KEY.length < 20
);
const SDK_MISSING = !CONFIG_MISSING && !CONFIG_INVALID &&
  (typeof window.supabase === 'undefined' || typeof window.supabase.createClient !== 'function');
let STARTUP_ERROR = CONFIG_MISSING ? 'missing' : CONFIG_INVALID ? 'invalid' : SDK_MISSING ? 'sdk' : '';
let sbClient = null;
if(!STARTUP_ERROR){
  try{ sbClient = window.supabase.createClient(CLEAN_URL, RAW_KEY); }
  catch(e){ console.error(e); STARTUP_ERROR = 'sdk'; }
}

/* ===================== STATE ===================== */
const state = {
  user: null,
  authMode: 'login',
  authError: '',
  authNotice: '',
  authBusy: false,

  pool: [],
  folders: [],
  activeTab: 'add',
  editingId: null,
  draftType: 'verb',
  draftLatin: '',
  draftForms: {},
  draftFolderId: null,
  meaningsDraft: [''],
  errors: {},
  folderContext: null,
  quickAddFolderOpen: false,
  poolFilter: '',
  poolFolderFilter: '',
  poolSort: 'latin',
  poolSelected: {},
  poolSelectMode: false,
  dictSuggestions: [],
  practice: { order: [], idx: 0, flipped: false, folderId: '' },
  test: {
    phase: 'settings',
    settings: { count: 10, withForms: true, folderId: '' },
    queue: [], idx: 0, results: [], answers: {}, checked: false
  }
};

const TYPE_LABELS = { verb: 'Verb', noun: 'Substantiv', adjective: 'Adjektiv', other: 'Sonstiges' };

/* ===================== DATA LAYER (Supabase) ===================== */
async function loadPool(){
  const { data: vocabRows, error: vErr } = await sbClient.from('vocab').select('*').order('latin');
  if(vErr){ console.error(vErr); state.pool = []; }
  else {
    state.pool = vocabRows.map(r => ({
      id: r.id, type: r.type, latin: r.latin,
      forms: r.forms || {}, meanings: r.meanings || [],
      folderId: r.folder_id, createdAt: r.created_at
    }));
  }
  const { data: folderRows, error: fErr } = await sbClient.from('folders').select('*').order('name');
  if(fErr){ console.error(fErr); state.folders = []; }
  else {
    state.folders = folderRows.map(f => ({ id: f.id, name: f.name }));
  }
}

async function insertVocab(entry){
  const { error } = await sbClient.from('vocab').insert({
    type: entry.type, latin: entry.latin, forms: entry.forms,
    meanings: entry.meanings, folder_id: entry.folderId
  });

/* ---- Shared dictionary: a static CSV file living next to index.html on GitHub Pages.
   Everyone who visits the site loads the same file — no per-user upload needed.
   To update it, just edit dictionary.csv in the GitHub repo (e.g. via GitHub's
   web editor) and commit; every visitor gets the new version on their next load. */
let DICTIONARY_CACHE = null;
let DICTIONARY_LOAD_ERROR = false;
async function loadDictionary(){
  if(DICTIONARY_CACHE) return DICTIONARY_CACHE;
  try{
    const res = await fetch('dictionary.csv', { cache: 'no-cache' });
    if(!res.ok){ DICTIONARY_CACHE = []; DICTIONARY_LOAD_ERROR = true; return DICTIONARY_CACHE; }
    const text = await res.text();
    DICTIONARY_CACHE = csvToDictionaryRows(text);
  }catch(e){
    console.error('Wörterbuch konnte nicht geladen werden:', e);
    DICTIONARY_CACHE = [];
    DICTIONARY_LOAD_ERROR = true;
  }
  if(state.activeTab === 'pool') render();
  return DICTIONARY_CACHE;
}
function searchDictionaryLocal(prefix){
  const p = (prefix||'').trim().toLowerCase();
  if(!p || !DICTIONARY_CACHE) return [];
  return DICTIONARY_CACHE.filter(r => r.latin.toLowerCase().startsWith(p)).slice(0, 8);
}

/* ===================== HELPERS ===================== */
function normalize(s){
  return (s || '').toString().toLowerCase()
    .replace(/[.,;:!?¡¿'"„“”‚‘’`´]/g,'').replace(/\s+/g,' ').trim();
}
function normalizeGenus(s){
  const n = normalize(s);
  if(['m','maskulin','maskulinum','männlich','mannlich'].includes(n)) return 'm';
  if(['f','feminin','femininum','weiblich'].includes(n)) return 'f';
  if(['n','neutrum','sächlich','sachlich'].includes(n)) return 'n';
  return n;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}
function fragCaesarUrl(word){ return 'https://www.frag-caesar.de/lateinwoerterbuch/' + encodeURIComponent((word||'').trim().toLowerCase()) + '-uebersetzung.html'; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function folderName(id){ if(!id) return null; const f = state.folders.find(x=>x.id===id); return f ? f.name : null; }
function poolByFolder(folderId){ if(!folderId) return state.pool; return state.pool.filter(v => (v.folderId||null) === folderId); }

/* ---- CSV parsing for the dictionary import ---- */
function parseCsv(text){
  const rows = [];
  let i = 0, field = '', row = [], inQuotes = false;
  const pushField = () => { row.push(field); field = ''; };
  const pushRow = () => { pushField(); rows.push(row); row = []; };
  while(i < text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    } else {
      if(c === '"'){ inQuotes = true; i++; continue; }
      if(c === ';'){ pushField(); i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ pushRow(); i++; continue; }
      field += c; i++; continue;
    }
  }
  if(field.length || row.length) pushRow();
  return rows.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ''));
}

function csvToDictionaryRows(text){
  const rows = parseCsv(text);
  if(rows.length < 2) return [];
  const header = rows[0].map(h => h.trim().toLowerCase());
  const idx = name => header.indexOf(name);
  const iWortart = idx('wortart'), iLatein = idx('latein'), iPraesens = idx('praesens'),
        iPerfekt = idx('perfekt'), iPpp = idx('ppp'), iGenitiv = idx('genitiv'), iGenus = idx('genus'),
        iNomF = idx('nomsgf'), iNomN = idx('nomsgn'), iBedeutungen = idx('bedeutungen');
  const typeMap = { verb:'verb', substantiv:'noun', nomen:'noun', adjektiv:'adjective', sonstiges:'other' };
  const out = [];
  for(let r = 1; r < rows.length; r++){
    const row = rows[r];
    if(!row || row.every(c => !c || !c.trim())) continue;
    const latin = ((iLatein > -1 ? row[iLatein] : '') || '').trim();
    if(!latin) continue;
    const wortartRaw = ((iWortart > -1 ? row[iWortart] : '') || '').trim().toLowerCase();
    const type = typeMap[wortartRaw] || 'other';
    const forms = {};
    if(type === 'verb'){
      if(iPraesens > -1) forms.praesens = (row[iPraesens]||'').trim();
      if(iPerfekt > -1) forms.perfekt = (row[iPerfekt]||'').trim();
      if(iPpp > -1) forms.ppp = (row[iPpp]||'').trim();
    } else if(type === 'noun'){
      if(iGenitiv > -1) forms.genitiv = (row[iGenitiv]||'').trim();
      if(iGenus > -1){ const g = (row[iGenus]||'').trim(); if(g) forms.genus = normalizeGenus(g); }
    } else if(type === 'adjective'){
      if(iNomF > -1) forms.nomF = (row[iNomF]||'').trim();
      if(iNomN > -1) forms.nomN = (row[iNomN]||'').trim();
    }
    const meanings = iBedeutungen > -1 ? (row[iBedeutungen]||'').split(';').map(m=>m.trim()).filter(Boolean) : [];
    out.push({ type, latin, forms, meanings });
  }
  return out;
}

function translateAuthError(msg){
  if(!msg) return 'Unbekannter Fehler.';
  if(msg.includes('Invalid login credentials')) return 'E-Mail oder Passwort ist falsch.';
  if(msg.includes('User already registered')) return 'Für diese E-Mail existiert bereits ein Konto — einfach anmelden.';
  if(msg.includes('Password should be at least')) return 'Das Passwort muss mindestens 6 Zeichen lang sein.';
  if(msg.includes('Unable to validate email')) return 'Diese E-Mail-Adresse scheint ungültig zu sein.';
  return msg;
}

function formFieldsFor(type){
  if(type==='verb') return [
    {key:'praesens', label:'1. Pers. Sg. Präsens Ind. Akt.', required:true},
    {key:'perfekt', label:'1. Pers. Sg. Perfekt Ind. Akt.', required:true},
    {key:'ppp', label:'PPP (falls vorhanden)', required:false}
  ];
  if(type==='noun') return [
    {key:'genitiv', label:'Genitiv Singular', required:true},
    {key:'genus', label:'Genus (m, f oder n eingeben)', required:true}
  ];
  if(type==='adjective') return [
    {key:'nomF', label:'Nominativ Sg. Femininum', required:true},
    {key:'nomN', label:'Nominativ Sg. Neutrum', required:true}
  ];
  return [];
}

function bindAuthEvents(){
  document.querySelectorAll('[data-auth-tab]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.authMode = btn.dataset.authTab;
      state.authError = ''; state.authNotice = '';
      render();
    });
  });
  document.getElementById('authForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    state.authError = ''; state.authNotice = ''; state.authBusy = true;
    render();
    try{
      if(state.authMode === 'login'){
        const { error } = await sbClient.auth.signInWithPassword({ email, password });
        if(error) throw error;
      } else {
        const { data, error } = await sbClient.auth.signUp({ email, password });
        if(error) throw error;
        if(data && data.session){
          // Email confirmation disabled -> logged in immediately
        } else {
          state.authNotice = 'Konto erstellt! Falls in deinem Supabase-Projekt die E-Mail-Bestätigung aktiv ist, bestätige zuerst deine Adresse und melde dich dann an.';
          state.authMode = 'login';
        }
      }
    }catch(err){
      state.authError = translateAuthError(err.message);
    }
    state.authBusy = false;
    render();
  });
}

  });
  document.getElementById('addMeaningBtn').addEventListener('click', ()=>{
    if(state.meaningsDraft.length < 6){
      state.meaningsDraft.push('');
      render();
      const inputs = document.querySelectorAll('#meaningsList input');
      inputs[inputs.length-1].focus();
    }
  });

  const cancelBtn = document.getElementById('cancelEditBtn');
  if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ resetDraft(); render(); });

  // Enter-Taste springt zum nächsten Eingabefeld statt das Formular abzuschicken
  form.addEventListener('keydown', e=>{
    if(e.key !== 'Enter') return;
    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') return;
    e.preventDefault();
    const focusable = Array.from(form.querySelectorAll('input, select')).filter(el=>!el.disabled);
    const idx = focusable.indexOf(e.target);
    if(idx > -1 && idx < focusable.length - 1){
      const next = focusable[idx+1];
      next.focus();
      if(next.select) next.select();
    } else {
      form.dispatchEvent(new Event('submit', {cancelable:true, bubbles:true}));
    }
  });

  form.addEventListener('submit', async e=>{
    e.preventDefault();
    state.errors = {};

    const latin = (state.draftLatin||'').trim();
    if(!latin) state.errors['latin'] = 'Bitte eine Vokabel eingeben.';

    const type = state.draftType || 'verb';
    const fieldDefs = formFieldsFor(type);
    const forms = {};
    fieldDefs.forEach(f=>{
      let val = (state.draftForms[f.key]||'').trim();
      if(f.key === 'genus' && val){
        const norm = normalizeGenus(val);
        if(['m','f','n'].includes(norm)) val = norm;
        else state.errors['form:'+f.key] = 'Bitte m, f oder n eingeben (oder maskulin/feminin/neutrum).';
      }
      forms[f.key] = val;
      if(f.required && !val && !state.errors['form:'+f.key]) state.errors['form:'+f.key] = 'Diese Form wird benötigt.';
    });

    const meanings = state.meaningsDraft.map(m=>m.trim()).filter(Boolean);
    if(meanings.length===0) state.errors['meanings'] = 'Bitte mindestens eine Bedeutung angeben.';

    if(Object.keys(state.errors).length > 0){ render(); return; }

    const entry = { type, latin, forms, meanings, folderId: state.draftFolderId || null };
    try{
      if(state.editingId !== null) await updateVocabRow(state.editingId, entry);
      else await insertVocab(entry);
      await loadPool();
      resetDraft();
      state.draftFolderId = state.folderContext;
      render();
    }catch(err){
      console.error(err);
      state.errors['latin'] = 'Speichern fehlgeschlagen: ' + err.message;
      render();
    }
  });
}

/* ===================== POOL TAB ===================== */
function sortedPool(list){
  const arr = list.slice();
  if(state.poolSort === 'type') arr.sort((a,b)=> TYPE_LABELS[a.type].localeCompare(TYPE_LABELS[b.type],'de') || a.latin.localeCompare(b.latin,'de'));
  else if(state.poolSort === 'created') arr.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
  else arr.sort((a,b)=>a.latin.localeCompare(b.latin,'de'));
  return arr;
}

      </h2>
      ${state.pool.length ? `

          <input type="text" id="poolSearch" placeholder="Vokabel suchen…" value="${escapeHtml(state.poolFilter)}">
          <select id="poolFolderFilter">
            <option value="" ${!state.poolFolderFilter?'selected':''}>Alle Ordner</option>
            ${state.folders.map(f=>`<option value="${f.id}" ${state.poolFolderFilter===f.id?'selected':''}>${escapeHtml(f.name)}</option>`).join('')}
          </select>
          <select id="poolSort">
            <option value="latin" ${state.poolSort==='latin'?'selected':''}>Alphabetisch</option>
            <option value="type" ${state.poolSort==='type'?'selected':''}>Nach Wortart</option>
            <option value="created" ${state.poolSort==='created'?'selected':''}>Zuletzt hinzugefügt</option>
          </select>
        </div>
        ${state.poolSelectMode ? `
        <div class="select-all-row">

        </div>

      <div class="pool-list">

function bindPoolTabEvents(){
  const toggleSelectMode = document.getElementById('toggleSelectMode');
  if(toggleSelectMode) toggleSelectMode.addEventListener('click', ()=>{

    if(!state.poolSelectMode) state.poolSelected = {};

  });

  const poolSearch = document.getElementById('poolSearch');
  if(poolSearch) poolSearch.addEventListener('input', e=>{
    const pos = e.target.selectionStart;
    state.poolFilter = e.target.value;
    render();
    const el2 = document.getElementById('poolSearch');
    el2.focus(); el2.setSelectionRange(pos, pos);
  });
  const poolFolderFilter = document.getElementById('poolFolderFilter');
  if(poolFolderFilter) poolFolderFilter.addEventListener('change', e=>{ state.poolFolderFilter = e.target.value; render(); });
  const poolSort = document.getElementById('poolSort');
  if(poolSort) poolSort.addEventListener('change', e=>{ state.poolSort = e.target.value; render(); });

  document.querySelectorAll('[data-select-vocab]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const id = e.target.dataset.selectVocab;

      render();
    });
  });
  const selectAll = document.getElementById('selectAllPool');
  if(selectAll) selectAll.addEventListener('change', e=>{
    document.querySelectorAll('[data-select-vocab]').forEach(cb=>{
      if(e.target.checked) state.poolSelected[cb.dataset.selectVocab] = true;
      else delete state.poolSelected[cb.dataset.selectVocab];
    });
    render();
  });
  const bulkMoveBtn = document.getElementById('bulkMoveBtn');
  if(bulkMoveBtn) bulkMoveBtn.addEventListener('click', async ()=>{
    const ids = Object.keys(state.poolSelected).filter(id=>state.poolSelected[id]);
    if(ids.length===0) return;
    const folderId = document.getElementById('bulkFolderSelect').value || null;
    try{
      await bulkMoveVocab(ids, folderId);
      state.poolSelected = {};
      await loadPool();
      render();
    }catch(err){ console.error(err); alert('Verschieben fehlgeschlagen: ' + err.message); }
  });
  const bulkClearBtn = document.getElementById('bulkClearBtn');
  if(bulkClearBtn) bulkClearBtn.addEventListener('click', ()=>{ state.poolSelected = {}; render(); });

  document.getElementById('createFolderBtn').addEventListener('click', async ()=>{
    const nameInput = document.getElementById('newFolderName');
    const name = nameInput.value.trim();
    if(!name) return;
    try{ await insertFolder(name); await loadPool(); render(); }
    catch(err){ console.error(err); alert('Ordner konnte nicht erstellt werden: ' + err.message); }
  });
  document.querySelectorAll('[data-delete-folder]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const fid = btn.dataset.deleteFolder;
      try{
        await deleteFolderRow(fid);
        if(state.folderContext===fid) state.folderContext = null;
        if(state.poolFolderFilter===fid) state.poolFolderFilter = '';
        await loadPool();
        render();
      }catch(err){ console.error(err); }
    });
  });

  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      startEditEntry(state.pool.find(x=>x.id===btn.dataset.edit));
      state.folderContext = state.draftFolderId;
      setActiveTab('add');
    });
  });
  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      try{
        await deleteVocabRow(btn.dataset.delete);
        if(state.editingId===btn.dataset.delete) resetDraft();
        delete state.poolSelected[btn.dataset.delete];
        await loadPool();
        render();
      }catch(err){ console.error(err); }
    });
  });
}

function renderPracticeTab(){

    return `<div class="panel"><div class="empty-state"><div class="big-word">Leerer Pool</div>Füge zuerst ein paar Vokabeln hinzu.</div></div>`;

          </div>
        </div>

        <button class="btn secondary small" id="editFromPractice">✎ Bearbeiten</button>
        <button class="btn secondary small" id="shuffleCards">Neu mischen</button>
        <button class="btn small" id="nextCard">Weiter ▶</button>
      </div>
    </div>
  `;
}

function bindPracticeEvents(){
  const folderSelect = document.getElementById('practiceFolderSelect');
  if(folderSelect) folderSelect.addEventListener('change', e=>{ state.practice.folderId = e.target.value; state.practice.order = []; render(); });

  const card = document.getElementById('flashcard');
  if(!card) return;
  card.addEventListener('click', ()=>{ state.practice.flipped = !state.practice.flipped; card.classList.toggle('flipped', state.practice.flipped); });
  document.getElementById('nextCard').addEventListener('click', ()=>{
    state.practice.idx = (state.practice.idx+1) % state.practice.order.length;
    state.practice.flipped = false; render();
  });
  document.getElementById('prevCard').addEventListener('click', ()=>{
    state.practice.idx = (state.practice.idx-1+state.practice.order.length) % state.practice.order.length;
    state.practice.flipped = false; render();
  });
  document.getElementById('shuffleCards').addEventListener('click', ()=>{
    const filtered = poolByFolder(state.practice.folderId);
    state.practice.order = shuffle(filtered.map(v=>v.id));
    state.practice.idx = 0; state.practice.flipped = false; render();
  });
  document.getElementById('editFromPractice').addEventListener('click', ()=>{
    const id = state.practice.order[state.practice.idx];
    startEditEntry(state.pool.find(x=>x.id===id));
    state.folderContext = state.draftFolderId;
    setActiveTab('add');
  });
}

/* ===================== TEST TAB ===================== */
function renderTestTab(){
  if(state.pool.length===0){
    return `<div class="panel"><div class="empty-state"><div class="big-word">Leerer Pool</div>Füge zuerst ein paar Vokabeln hinzu.</div></div>`;
  }
  if(state.test.phase==='settings') return renderTestSettings();
  if(state.test.phase==='running') return renderTestQuestion();
  return renderTestSummary();
}

function renderTestSettings(){
  const filtered = poolByFolder(state.test.settings.folderId);
  const max = Math.max(filtered.length, 1);
  if(state.test.settings.count > filtered.length) state.test.settings.count = filtered.length || 1;
  if(state.test.settings.count < 1) state.test.settings.count = Math.min(1, filtered.length);

  return `
    <div class="panel">
      <h2 class="section-title">Test-Einstellungen</h2>
      <div class="settings-row">
        <div>
          <label class="field-label">Ordner</label>
          <select class="select-field" id="testFolderSelect">
            <option value="" ${!state.test.settings.folderId?'selected':''}>Alle Ordner (${state.pool.length})</option>
            ${state.folders.map(f=>`<option value="${f.id}" ${state.test.settings.folderId===f.id?'selected':''}>${escapeHtml(f.name)} (${poolByFolder(f.id).length})</option>`).join('')}
          </select>
        </div>
        ${filtered.length===0 ? '<div class="empty-note">In diesem Ordner sind keine Vokabeln.</div>' : `
        <div>
          <label class="field-label">Anzahl abgefragter Vokabeln</label>
          <div class="slider-row">
            <input type="range" id="countSlider" min="1" max="${max}" value="${state.test.settings.count}">
            <div class="slider-val" id="countVal">${state.test.settings.count}</div>
          </div>
        </div>
        <div class="toggle-row">
          <div><div class="label">Formen abfragen</div><div class="desc">Stammformen, Genitiv/Genus bzw. Adjektivformen mit abfragen</div></div>
          <label class="switch"><input type="checkbox" id="withFormsToggle" ${state.test.settings.withForms?'checked':''}><span class="track"><span class="knob"></span></span></label>
        </div>`}
      </div>
      <div class="btn-row"><button class="btn" id="startTestBtn" ${filtered.length===0?'disabled':''}>Test starten</button></div>
    </div>
  `;
}

function buildQuestionFor(v){
  const fields = state.test.settings.withForms ? formFieldsFor(v.type).filter(f => v.forms[f.key]) : [];
  const meaningCount = Math.min(3, v.meanings.length);
  return { id: v.id, fields, meaningCount };
}

function renderTestQuestion(){
  const q = state.test.queue[state.test.idx];
  const v = state.pool.find(x=>x.id===q.id);
  const checked = state.test.checked;
  const answers = state.test.answers;

  const fieldsHtml = q.fields.map(f=>{
    const key = 'field:'+f.key;
    const val = answers[key] || '';
    let rowClass = '', feedback = '';
    if(checked){
      const correct = f.key==='genus' ? normalizeGenus(val)===normalizeGenus(v.forms[f.key]) : normalize(val)===normalize(v.forms[f.key]);
      rowClass = correct ? 'correct' : 'incorrect';
      feedback = correct ? '<div class="answer-feedback correct">✓ richtig</div>' : `<div class="answer-feedback incorrect">✕ richtig wäre: ${escapeHtml(v.forms[f.key])}</div>`;
    }
    return `<div class="answer-input-row ${rowClass}"><label class="field-label">${f.label}</label>
      <input type="text" data-answer="${key}" value="${escapeHtml(val)}" ${checked?'readonly':''}>${feedback}</div>`;
  }).join('');

  const correctMeaningsNorm = checked ? gradeMeaningsForDisplay(v.meanings, q.meaningCount, answers) : null;
  const meaningsHtml = Array.from({length:q.meaningCount}).map((_,i)=>{
    const key = 'meaning:'+i;
    const val = answers[key] || '';
    let rowClass = '', feedback = '';
    if(checked){
      const isCorrect = correctMeaningsNorm.results[i];
      rowClass = isCorrect ? 'correct' : 'incorrect';
      feedback = isCorrect ? '<div class="answer-feedback correct">✓ richtig</div>' : '<div class="answer-feedback incorrect">✕ nicht erkannt</div>';
    }
    return `<div class="answer-input-row ${rowClass}"><input type="text" data-answer="${key}" value="${escapeHtml(val)}" placeholder="Bedeutung ${i+1}" ${checked?'readonly':''}>${feedback}</div>`;
  }).join('');

  const allMeaningsHint = checked ? `<div class="field-hint" style="margin-top:6px;">Alle hinterlegten Bedeutungen: ${escapeHtml(v.meanings.join(', '))}</div>` : '';

  return `
    <div class="panel">
      <div class="test-progress">FRAGE ${state.test.idx+1} / ${state.test.queue.length}</div>
      <div class="test-word">${escapeHtml(v.latin)}</div>
      <div class="test-type">${TYPE_LABELS[v.type]}</div>
      ${q.fields.length ? `<div class="answer-block"><div class="block-title">Formen</div>${fieldsHtml}</div>` : ''}
      <div class="answer-block">
        <div class="block-title">Bedeutung${q.meaningCount>1?'en':''} (${q.meaningCount})</div>
        ${meaningsHtml}${allMeaningsHint}
      </div>
      <div class="btn-row">
        ${!checked ? `<button class="btn" id="checkAnswerBtn">Prüfen</button>` : `<button class="btn" id="nextQuestionBtn">${state.test.idx+1 < state.test.queue.length ? 'Weiter ▶' : 'Ergebnis anzeigen'}</button>`}
      </div>
    </div>
  `;
}

function gradeMeaningsForDisplay(meanings, count, answers){
  const correctNorm = meanings.map(normalize);
  const used = new Array(correctNorm.length).fill(false);
  const results = [];
  for(let i=0;i<count;i++){
    const val = normalize(answers['meaning:'+i] || '');
    let found = false;
    if(val){
      for(let j=0;j<correctNorm.length;j++){ if(!used[j] && correctNorm[j]===val){ used[j]=true; found=true; break; } }
    }
    results.push(found);
  }
  return { results };
}

function renderTestSummary(){
  let totalFields=0, correctFields=0, totalMeanings=0, correctMeanings=0;
  const details = state.test.results.map(r=>`
    <div class="summary-item"><span class="sw">${escapeHtml(r.latin)}</span>
      <div class="detail">Formen: ${r.formsCorrect}/${r.formsTotal} · Bedeutungen: ${r.meaningsCorrect}/${r.meaningsTotal}</div></div>
  `).join('');
  state.test.results.forEach(r=>{
    totalFields += r.formsTotal; correctFields += r.formsCorrect;
    totalMeanings += r.meaningsTotal; correctMeanings += r.meaningsCorrect;
  });
  const total = totalFields + totalMeanings;
  const correct = correctFields + correctMeanings;
  const pct = total>0 ? Math.round((correct/total)*100) : 0;

  return `
    <div class="panel">
      <h2 class="section-title">Testergebnis</h2>
      <div class="summary-score"><div class="big">${pct}%</div><div class="lbl">${correct} von ${total} richtig</div></div>
      <div class="summary-list">${details}</div>
      <div class="btn-row"><button class="btn" id="restartTestBtn">Neuer Test</button></div>
    </div>
  `;
}

function bindTestEvents(){
  const folderSelect = document.getElementById('testFolderSelect');
  if(folderSelect){
    folderSelect.addEventListener('change', e=>{
      state.test.settings.folderId = e.target.value;
      const filtered = poolByFolder(state.test.settings.folderId);
      state.test.settings.count = Math.min(state.test.settings.count || 10, filtered.length || 1);
      render();
    });
  }
  const slider = document.getElementById('countSlider');
  if(slider) slider.addEventListener('input', e=>{
    state.test.settings.count = parseInt(e.target.value,10);
    document.getElementById('countVal').textContent = state.test.settings.count;
  });
  const toggle = document.getElementById('withFormsToggle');
  if(toggle) toggle.addEventListener('change', e=>{ state.test.settings.withForms = e.target.checked; });

  const startBtn = document.getElementById('startTestBtn');
  if(startBtn) startBtn.addEventListener('click', ()=>{
    const filtered = poolByFolder(state.test.settings.folderId);
    const ids = shuffle(filtered.map(v=>v.id)).slice(0, state.test.settings.count);
    state.test.queue = ids.map(id => buildQuestionFor(state.pool.find(v=>v.id===id)));
    state.test.idx = 0; state.test.results = []; state.test.answers = {}; state.test.checked = false;
    state.test.phase = 'running';
    render();
  });

  document.querySelectorAll('[data-answer]').forEach(inp=>{
    inp.addEventListener('input', e=>{ state.test.answers[e.target.dataset.answer] = e.target.value; });
  });

  const checkBtn = document.getElementById('checkAnswerBtn');
  if(checkBtn) checkBtn.addEventListener('click', ()=>{
    const q = state.test.queue[state.test.idx];
    const v = state.pool.find(x=>x.id===q.id);
    let formsCorrect = 0;
    q.fields.forEach(f=>{
      const val = state.test.answers['field:'+f.key] || '';
      const ok = f.key==='genus' ? normalizeGenus(val)===normalizeGenus(v.forms[f.key]) : normalize(val)===normalize(v.forms[f.key]);
      if(ok) formsCorrect++;
    });
    const mResult = gradeMeaningsForDisplay(v.meanings, q.meaningCount, state.test.answers);
    const meaningsCorrect = mResult.results.filter(Boolean).length;
    state.test.results.push({ latin: v.latin, formsCorrect, formsTotal: q.fields.length, meaningsCorrect, meaningsTotal: q.meaningCount });
    state.test.checked = true;
    render();
  });

  const nextBtn = document.getElementById('nextQuestionBtn');
  if(nextBtn) nextBtn.addEventListener('click', ()=>{
    state.test.idx++; state.test.answers = {}; state.test.checked = false;
    if(state.test.idx >= state.test.queue.length) state.test.phase = 'summary';
    render();
  });

  const restartBtn = document.getElementById('restartTestBtn');
  if(restartBtn) restartBtn.addEventListener('click', ()=>{ state.test.phase = 'settings'; render(); });
}

/* ===================== DISPATCH ===================== */
function bindTabEvents(){
  if(state.activeTab==='add') bindAddTabEvents();
  else if(state.activeTab==='pool') bindPoolTabEvents();
  else if(state.activeTab==='practice') bindPracticeEvents();
  else if(state.activeTab==='test') bindTestEvents();
}

document.querySelectorAll('nav.tabs button').forEach(b=> b.addEventListener('click', ()=> setActiveTab(b.dataset.tab)));

/* ===================== INIT ===================== */
(async function init(){
  loadDictionary(); // fire-and-forget: static file, independent of Supabase/auth
  if(STARTUP_ERROR || !sbClient){ render(); return; }
  try{
    const { data: { session } } = await sbClient.auth.getSession();
    state.user = session ? session.user : null;
    if(state.user) await loadPool();
    render();

    sbClient.auth.onAuthStateChange(async (event, session) => {
      const newUser = session ? session.user : null;
      const wasLoggedIn = !!state.user;
      state.user = newUser;
      if(newUser && !wasLoggedIn){
        await loadPool();
        state.activeTab = 'add';
        render();
      } else if(!newUser && wasLoggedIn){
        state.pool = []; state.folders = [];
        render();
      }
    });
  }catch(e){
    console.error('Startfehler:', e);
    STARTUP_ERROR = 'sdk';
    render();
  }
})();
</script>
<script>
// Letzter Sicherheitsnetz: falls das Hauptskript aus einem unvorhergesehenen Grund
// abbricht (z. B. weil ein Werbeblocker das Laden von cdn.jsdelivr.net verhindert
// und der Fehler nicht im try/catch oben landet), zeigt dies nach kurzer Wartezeit
// wenigstens eine erklärende Meldung statt einer leeren Seite.
setTimeout(function(){
  var nav = document.getElementById('mainNav');
  var content = document.getElementById('content');
  var stillBlank = content && content.innerHTML.trim() === '' && (!nav || nav.style.display === 'none' || nav.style.display === '');
  if(stillBlank){
    content.innerHTML =
      '<div class="panel"><h2 class="section-title">Es ist ein unerwarteter Fehler aufgetreten</h2>' +
      '<div class="setup-notice">Die Seite konnte nicht vollständig starten. Das liegt meist an einem Werbeblocker oder einer ' +
      'Browser-Erweiterung, die das Laden von <code>cdn.jsdelivr.net</code> (die Supabase-Bibliothek) verhindert, oder an ' +
      'fehlender Internetverbindung. Lade die Seite neu, deaktiviere ggf. Werbeblocker für diese Seite, oder öffne die ' +
      'Browser-Konsole (F12) für Details und teile die Fehlermeldung mit.</div></div>';
  }
}, 4000);
</script>
